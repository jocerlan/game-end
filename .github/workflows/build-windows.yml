name: Build Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build EXE with PyInstaller (do not embed external images)
        run: |
          pyinstaller --onefile --name "ColetorMoedas" game.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ColetorMoedas-windows
          path: dist/ColetorMoedas.exe
